<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sync Timer - Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sync Timer</h1>
        
        <!-- 新規作成カード -->
        <div class="card">
            <h2>新規ルーム作成</h2>
            <p>新しい同期タイマーを開始します。</p>
            <button id="btn-create" class="btn-primary">ルームを発行する</button>
        </div>

        <div class="divider">OR</div>

        <!-- 既存入室カード -->
        <div class="card">
            <h2>ルームに参加</h2>
            <div class="input-group">
                <input type="text" id="room-id" placeholder="ルーム番号 (4桁)" maxlength="4">
                <input type="text" id="room-pin" placeholder="PIN (4桁)" maxlength="4">
            </div>
            <button id="btn-join" class="btn-secondary">入室する</button>
        </div>
    </div>

    <script>
        // 「新規作成」ボタン
        document.getElementById('btn-create').addEventListener('click', () => {
            const newRoom = Math.floor(1000 + Math.random() * 9000);
            const newPin = Math.floor(1000 + Math.random() * 9000);
            // URLパラメータに乗せてタイマーページへ移動
            window.location.href = `timer.html?room=${newRoom}&pin=${newPin}&mode=new`;
        });

        // 「入室」ボタン
        document.getElementById('btn-join').addEventListener('click', () => {
            const room = document.getElementById('room-id').value;
            const pin = document.getElementById('room-pin').value;
            if (room.length === 4 && pin.length === 4) {
                window.location.href = `timer.html?room=${room}&pin=${pin}&mode=join`;
            } else {
                alert('ルーム番号とPINを4桁で入力してください。');
            }
        });
    </script>
</body>
</html>
