name: Deploy Broadcast Timer

on:
  push:
    branches:
      - main
      - develop
    # 以下のフォルダやファイルに変更があった時だけActionを動かします
    paths:
      - 'backend/**'                       # Goのプログラムが変わった時
      - 'infra/**'                         # CDKの設計図が変わった時
      - '.github/workflows/deploy.yml'     # このAction自体の設定が変わった時

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js (for CDK)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Build Go Backend
        working-directory: ./backend
        run: |
          go mod tidy
          # 先ほど解決したGLIBCエラー対策（静的ビルド）をここで確実に実行します
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bootstrap main.go
          zip main.zip bootstrap

      - name: Determine Environment
        id: env-check
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via CDK
        working-directory: ./infra
        run: |
          go mod tidy
          # 判定した環境名（dev or prod）を -c env に渡して1回だけデプロイします
          cdk deploy -c env=${{ steps.env-check.outputs.env_name }} --require-approval never