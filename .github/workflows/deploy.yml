name: Deploy Broadcast Timer to AWS

on:
  push:
    branches:
      - main # mainブランチに変更があった時に実行
      - develop # developブランチも監視対象に追加

# OIDC連携のために必要な権限設定
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js (for CDK)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }} # 後で設定するIAMロールのARN
          aws-region: ap-northeast-1

      - name: Build Go Backend
        working-directory: ./backend
        run: |
          go mod tidy
          chmod +x build.sh
          ./build.sh

      - name: Deploy Infrastructure via CDK
        working-directory: ./infra
        run: |
          go mod tidy
          # CI環境のため、確認プロンプトをスキップしてデプロイ
          cdk deploy -c env=prod --require-approval never

      - name: Determine Environment
        id: env-check
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via CDK
        working-directory: ./infra
        run: |
          # 判定した環境名（dev or prod）を -c env に渡す
          # CI環境（GitHub Actions）ではOIDCの環境変数を使うため --profile 指定は不要です
          cdk deploy -c env=${{ steps.env-check.outputs.env_name }} --require-approval never