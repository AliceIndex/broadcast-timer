name: Deploy Broadcast Timer to AWS

on:
  push:
    branches:
      - main # mainブランチに変更があった時に実行

# OIDC連携のために必要な権限設定
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js (for CDK)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }} # 後で設定するIAMロールのARN
          aws-region: ap-northeast-1

      - name: Build Go Backend
        working-directory: ./backend
        run: |
          go mod tidy
          chmod +x build.sh
          ./build.sh

      - name: Deploy Infrastructure via CDK
        working-directory: ./infra
        run: |
          go mod tidy
          # CI環境のため、確認プロンプトをスキップしてデプロイ
          cdk deploy -c env=prod --require-approval never
